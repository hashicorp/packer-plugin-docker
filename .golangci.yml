version: "2"

run:
  concurrency: 4
  issues-exit-code: 1
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - unused
  exclusions:
    generated: lax
    rules:
      - linters:
          - staticcheck
        text: S(1002|1008|1021)
      - linters:
          - staticcheck
        text: ST1005
      - linters:
          - staticcheck
        text: 'SA(1006|1019|4006|4010|4017|5007|6005|9004):'
      - linters:
          - lll
        source: '^//go:generate '
    paths:
      - .*\.hcl2spec\.go$

formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - .*\.hcl2spec\.go$
